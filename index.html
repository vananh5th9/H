<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chainlink-Oracle Game Predictor</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #0c0e11;
            color: #eaeaea;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 450px;
            width: 100%;
            background: #181a20;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
            box-sizing: border-box;
        }
        h2 { text-align: center; color: #f3ba2f; margin: 0 0 5px 0; font-size: 20px; }
        .subtitle { text-align: center; color: #848e9c; font-size: 11px; margin-bottom: 20px; }
        
        .price-panel {
            background: #2b3139;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            margin-bottom: 15px;
        }
        .price-label { font-size: 12px; color: #848e9c; }
        .price-main { font-size: 34px; font-weight: bold; color: #f3ba2f; margin: 5px 0; }
        
        .sources { display: flex; justify-content: space-around; font-size: 11px; color: #aeaeae; margin-top: 8px; border-top: 1px solid #474d57; padding-top: 8px;}

        .result-box {
            padding: 22px;
            border-radius: 12px;
            text-align: center;
            font-size: 28px;
            font-weight: 800;
            background: #21262c;
            margin-bottom: 15px;
        }
        .UP { color: #0ecb81; border: 2px solid #0ecb81; background: rgba(14, 203, 129, 0.1); }
        .DOWN { color: #f6465d; border: 2px solid #f6465d; background: rgba(246, 70, 93, 0.1); }
        .NEUTRAL { color: #848e9c; border: 2px dashed #474d57; }

        .status-list {
            background: #1e2329;
            padding: 12px;
            border-radius: 8px;
            font-size: 12px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>AI ORACLE PREDICTOR</h2>
    <div class="subtitle">Thuật toán giả lập chuỗi dữ liệu tổng hợp (Chainlink VWAP)</div>

    <div class="price-panel">
        <div class="price-label">GIÁ TỔNG HỢP ĐA SÀN (ƯỚC TÍNH GIÁ GAME)</div>
        <div class="price-main" id="oraclePrice">$0.00</div>
        <div class="sources">
            <span>Binance: <span id="pBinance">0.00</span></span>
            <span>Coinbase: <span id="pCoinbase">0.00</span></span>
        </div>
    </div>

    <div id="prediction" class="result-box NEUTRAL">ĐANG ĐỒNG BỘ SÀN...</div>

    <div class="status-list">
        • Độ tin cậy thuật toán: <span id="confidence" style="color:#f3ba2f; font-weight:bold;">0%</span><br>
        • Cường độ dòng tiền tổng hợp: <span id="flow">Đang quét...</span><br>
        • Trạng thái: <span style="color:#0ecb81">Đang chạy ngầm tự động liên tục</span>
    </div>
</div>

<script>
let binancePrice = 0;
let coinbasePrice = 0;
let historyData = [];

// 1. Kết nối Websocket lấy giá Binance
const wsBinance = new WebSocket("wss://stream.binance.com:9443/ws/bnbusdt@ticker");
wsBinance.onmessage = (e) => {
    const data = JSON.parse(e.data);
    binancePrice = parseFloat(data.c);
    document.getElementById('pBinance').innerText = binancePrice.toFixed(2);
    updateOraclePrice();
};

// 2. Kết nối Websocket lấy giá Coinbase
const wsCoinbase = new WebSocket("wss://ws-feed.exchange.coinbase.com");
wsCoinbase.onopen = () => {
    wsCoinbase.send(JSON.stringify({
        "type": "subscribe",
        "product_ids": ["BNB-USD"],
        "channels": ["ticker"]
    }));
};
wsCoinbase.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if(data.type === "ticker" && data.price) {
        coinbasePrice = parseFloat(data.price);
        document.getElementById('pCoinbase').innerText = coinbasePrice.toFixed(2);
        updateOraclePrice();
    }
};

// 3. Tính toán giá trung bình để khớp với cấu trúc Oracle Chainlink
function updateOraclePrice() {
    if (binancePrice === 0 || coinbasePrice === 0) return;
    
    // Công thức tính trung bình để mượt giá giống Chainlink
    const avgPrice = (binancePrice + coinbasePrice) / 2;
    document.getElementById('oraclePrice').innerText = `$${avgPrice.toFixed(2)}`;

    historyData.push({ price: avgPrice, time: Date.now() });
    if(historyData.length > 60) historyData.shift(); 

    if(historyData.length > 10) {
        runOracleAI(avgPrice);
    }
}

function runOracleAI(currentAvg) {
    // Đo lường độ lệch giá trong các khoảng 15s và 45s để đón đầu nhịp chốt 90s của game
    const t15Idx = Math.max(0, historyData.length - 15);
    const t45Idx = Math.max(0, historyData.length - 45);
    
    const d15 = currentAvg - historyData[t15Idx].price;
    const d45 = currentAvg - historyData[t45Idx].price;

    let upScore = 0;
    let downScore = 0;

    if (d15 > 0) upScore += 3; else if (d15 < 0) downScore += 3;
    if (d45 > 0) upScore += 2; else if (d45 < 0) downScore += 2;

    const total = upScore + downScore;
    const confidence = total > 0 ? Math.round((Math.max(upScore, downScore) / total) * 100) : 0;

    document.getElementById('confidence').innerText = `${confidence}%`;
    document.getElementById('flow').innerText = d45 > 0 ? "LỰC MUA ÁP ĐẢO" : "LỰC BÁN ÁP ĐẢO";
    document.getElementById('flow').style.color = d45 > 0 ? "#0ecb81" : "#f6465d";

    const box = document.getElementById('prediction');
    // Chỉ báo lệnh khi xu hướng đa sàn đồng thuận cao (>65%), giảm thiểu tối đa lệch nến đơn lẻ
    if (confidence > 65) {
        if (upScore > downScore) {
            box.className = "result-box UP";
            box.innerText = "DỰ ĐOÁN: LÊN";
        } else {
            box.className = "result-box DOWN";
            box.innerText = "DỰ ĐOÁN: XUỐNG";
        }
    } else {
        box.className = "result-box NEUTRAL";
        box.innerText = "SÓNG NHIỄU - BỎ QUA";
    }
}
</script>

</body>
</html>
