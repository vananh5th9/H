<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Hệ Thống Quét Trùng Ảnh</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-glow: #080a10;
            --card-bg: rgba(17, 22, 37, 0.9);
            --primary: #00f2fe;
            --secondary: #4facfe;
            --neon-green: #39ff14;
            --neon-red: #ff3838;
            --text-main: #f1f2f6;
            --text-sub: #a4b0be;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-glow);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 242, 254, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(79, 172, 254, 0.05) 0%, transparent 40%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .app-box {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            padding: 30px;
            border-radius: 24px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            text-align: center;
            position: relative;
        }

        .app-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
        }

        .app-logo {
            font-size: 3rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        h2 {
            font-size: 1.4rem;
            font-weight: 700;
            margin: 0 0 25px 0;
            letter-spacing: 0.5px;
        }

        .upload-area {
            border: 2px dashed rgba(0, 242, 254, 0.3);
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            padding: 35px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .upload-area:hover {
            border-color: var(--primary);
            background: rgba(0, 242, 254, 0.03);
        }

        .upload-area i {
            font-size: 2.3rem;
            color: var(--text-sub);
            margin-bottom: 10px;
        }

        .upload-area p {
            margin: 0;
            font-size: 0.95rem;
            color: var(--text-main);
        }

        #fileInput { display: none; }

        /* THÔNG BÁO HỢP LỆ (NGẮN GỌN) */
        .status-success-box {
            display: none;
            background: rgba(57, 255, 20, 0.1);
            border: 1px solid rgba(57, 255, 20, 0.2);
            color: var(--neon-green);
            padding: 12px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.95rem;
            margin-top: 20px;
            animation: fadeIn 0.3s ease;
        }

        /* CHI TIẾT ẢNH TRÙNG LẶP */
        .scan-result-container {
            margin-top: 20px;
            display: none;
            text-align: left;
            animation: fadeIn 0.3s ease;
        }

        .result-item {
            background: rgba(255, 56, 56, 0.08);
            border: 1px solid rgba(255, 56, 56, 0.2);
            border-radius: 14px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .result-item img {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 10px;
            border: 1px solid rgba(255, 56, 56, 0.3);
        }

        .result-info { flex-grow: 1; }

        .result-status {
            font-size: 0.8rem;
            font-weight: 700;
            padding: 5px 10px;
            border-radius: 6px;
            background: rgba(255, 56, 56, 0.2);
            color: var(--neon-red);
            border: 1px solid rgba(255, 56, 56, 0.3);
            white-space: nowrap;
        }

        /* LỊCH SỬ RÚT GỌN */
        .history-section {
            margin-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-top: 20px;
            text-align: left;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .history-title {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-sub);
            text-transform: uppercase;
        }

        .btn-clear {
            background: transparent;
            color: #ff4d4d;
            border: none;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            padding: 0;
        }

        .btn-clear:hover { text-decoration: underline; }

        .history-list {
            max-height: 140px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.15);
            border-radius: 10px;
            padding: 8px 12px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.02);
            font-size: 0.8rem;
            color: rgba(241, 242, 246, 0.6);
        }

        .history-item:last-child { border-bottom: none; }

        .loader {
            display: none;
            color: var(--primary);
            font-size: 0.9rem;
            margin: 15px 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="app-box">
    <div class="app-logo">
        <i class="fa-solid fa-eye"></i>
    </div>
    <h2>KIỂM TRA TRÙNG ẢNH</h2>

    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <i class="fa-solid fa-images"></i>
        <p>Chọn hoặc kéo thả ảnh vào đây để quét</p>
    </div>
    <input type="file" id="fileInput" accept="image/*" multiple onchange="handleImageUpload(event)">

    <div class="loader" id="loadingText">
        <i class="fa-solid fa-spinner fa-spin"></i> Đang quét cấu trúc ảnh...
    </div>

    <div class="status-success-box" id="successBox">
        <i class="fa-solid fa-circle-check"></i> KHÔNG TRÙNG LẶP - ÁNH HỢP LỆ!
    </div>

    <div class="scan-result-container" id="resultContainer">
        <div style="font-size: 0.85rem; margin-bottom: 10px; font-weight: 700; color: var(--neon-red)">
            ⚠️ PHÁT HIỆN ẢNH TRÙNG LẶP DƯỚI ĐÂY:
        </div>
        <div id="resultList"></div>
    </div>

    <div class="history-section">
        <div class="history-header">
            <div class="history-title">Tổng số ảnh đã lưu: <span id="historyCount" style="color:var(--primary)">0</span></div>
            <button class="btn-clear" onclick="clearHistory()">Xóa lịch sử</button>
        </div>
        <div class="history-list" id="historyContainer"></div>
    </div>
</div>

<script>
    let imageHistory = JSON.parse(localStorage.getItem('scanned_image_history')) || [];

    renderHistoryList();

    async function handleImageUpload(event) {
        const files = event.target.files;
        if (!files.length) return;

        document.getElementById('loadingText').style.display = 'block';
        document.getElementById('successBox').style.display = 'none';
        document.getElementById('resultContainer').style.display = 'none';
        
        const resultList = document.getElementById('resultList');
        resultList.innerHTML = '';

        let hasDuplicate = false;
        const nowStr = new Date().toLocaleString('vi-VN');

        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            const imgBase64 = await fileToDataURL(file);
            const imgHash = await generateSimpleHash(imgBase64);
            
            const matchedItem = imageHistory.find(item => item.hash === imgHash);
            
            if (matchedItem) {
                hasDuplicate = true;
                
                // Chỉ tạo và hiện chi tiết đối với những ảnh bị trùng
                const itemDiv = document.createElement('div');
                itemDiv.className = 'result-item';
                itemDiv.innerHTML = `
                    <img src="${imgBase64}" alt="duplicate">
                    <div class="result-info">
                        <div style="font-weight: 700; font-size: 0.9rem; color: #ff4d4d; margin-bottom:3px;">${file.name}</div>
                        <div style="font-size: 0.8rem; color: var(--text-sub)">ID ảnh: ${imgHash}</div>
                        <div style="font-size: 0.8rem; color: var(--text-sub)">Đã tải lên vào: ${matchedItem.time}</div>
                    </div>
                    <span class="result-status"><i class="fa-solid fa-triangle-exclamation"></i> BỊ TRÙNG</span>
                `;
                resultList.appendChild(itemDiv);
            } else {
                // Ảnh hợp lệ thì âm thầm lưu vào lịch sử, không hiện chi tiết
                imageHistory.push({
                    name: file.name,
                    hash: imgHash,
                    time: nowStr
                });
            }
        }

        localStorage.setItem('scanned_image_history', JSON.stringify(imageHistory));
        renderHistoryList();
        document.getElementById('loadingText').style.display = 'none';

        // Xử lý hiển thị kết quả cuối cùng theo điều kiện
        if (hasDuplicate) {
            document.getElementById('resultContainer').style.display = 'block';
        } else {
            document.getElementById('successBox').style.display = 'block';
        }
        
        document.getElementById('fileInput').value = '';
    }

    function fileToDataURL(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
            reader.readAsDataURL(file);
        });
    }

    function generateSimpleHash(str) {
        return new Promise((resolve) => {
            let hash = 0;
            if (str.length === 0) resolve(hash.toString(16));
            const step = Math.max(1, Math.floor(str.length / 4000));
            for (let i = 0; i < str.length; i += step) {
                hash = ((hash << 5) - hash) + str.charCodeAt(i);
                hash = hash & hash;
            }
            resolve("ID-" + Math.abs(hash).toString(16).toUpperCase());
        });
    }

    function renderHistoryList() {
        const container = document.getElementById('historyContainer');
        document.getElementById('historyCount').innerText = imageHistory.length;
        container.innerHTML = '';

        if (imageHistory.length === 0) {
            container.innerHTML = '<div style="font-size:0.75rem; color:var(--text-sub); text-align:center; padding:10px 0;">Lịch sử trống</div>';
            return;
        }

        const reversedHistory = [...imageHistory].reverse();
        reversedHistory.forEach(item => {
            const row = document.createElement('div');
            row.className = 'history-item';
            row.innerHTML = `
                <span style="text-overflow: ellipsis; overflow: hidden; white-space: nowrap; max-width: 250px;">
                    <i class="fa-regular fa-image" style="color:var(--secondary); margin-right:5px;"></i>${item.name}
                </span>
                <span style="color:var(--text-sub); font-size:0.75rem;">${item.hash}</span>
            `;
            container.appendChild(row);
        });
    }

    function clearHistory() {
        if (!confirm('Xóa toàn bộ lịch sử ảnh cũ?')) return;
        imageHistory = [];
        localStorage.removeItem('scanned_image_history');
        renderHistoryList();
        document.getElementById('successBox').style.display = 'none';
        document.getElementById('resultContainer').style.display = 'none';
    }
</script>

</body>
</html>
