<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binance Predictor (Technical Analysis)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #12161a;
            color: #eaeaea;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: #1e2329;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h2 { text-align: center; color: #f3ba2f; margin-top: 0; }
        .row { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 14px; color: #aeaeae; }
        select, input {
            width: 100%;
            padding: 10px;
            background: #2b3139;
            border: 1px solid #474d57;
            color: white;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #f3ba2f;
            border: none;
            color: #12161a;
            font-weight: bold;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background: #ecb21f; }
        .result-box {
            margin-top: 20px;
            padding: 20px;
            border-radius: 5px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            background: #2b3139;
        }
        .UP { color: #0ecb81; border: 2px solid #0ecb81; background: rgba(14, 203, 129, 0.1); }
        .DOWN { color: #f6465d; border: 2px solid #f6465d; background: rgba(246, 70, 93, 0.1); }
        .NEUTRAL { color: #929aa5; border: 2px solid #929aa5; }
        .details {
            margin-top: 15px;
            font-size: 13px;
            color: #aeaeae;
            background: #181a20;
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Binance Trend Predictor</h2>
    
    <div class="row">
        <label>Cặp giao dịch:</label>
        <select id="symbol">
            <option value="BTCUSDT">BTC/USDT</option>
            <option value="ETHUSDT">ETH/USDT</option>
            <option value="BNBUSDT">BNB/USDT</option>
            <option value="SOLUSDT">SOL/USDT</option>
        </select>
    </div>

    <div class="row">
        <label>Khung thời gian (Interval):</label>
        <select id="interval">
            <option value="1m">1 Phút</option>
            <option value="5m" selected>5 Phút</option>
            <option value="15m">15 Phút</option>
            <option value="1h">1 Giờ</option>
            <option value="4h">4 Giờ</option>
        </select>
    </div>

    <hr style="border-color: #2b3139; margin: 20px 0;">
    <h3 style="color: #f3ba2f; font-size: 16px;">Bộ điều chỉnh độ nhạy (Tối ưu thuật toán)</h3>
    
    <div class="row">
        <label>Ngưỡng RSI Quá mua (Mặc định 70 - Tăng để giảm báo giả DOWN):</label>
        <input type="number" id="rsiOverbought" value="70" min="50" max="90">
    </div>
    <div class="row">
        <label>Ngưỡng RSI Quá bán (Mặc định 30 - Giảm để giảm báo giả UP):</label>
        <input type="number" id="rsiOversold" value="30" min="10" max="50">
    </div>

    <button onclick="fetchDataAndPredict()">PHÂN TÍCH & DỰ ĐOÁN</button>

    <div id="result" class="result-box NEUTRAL">CHƯA CÓ DỮ LIỆU</div>
    
    <div class="details" id="details">
        Hãy nhấn nút Dự đoán để quét dữ liệu từ hệ thống Binance...
    </div>
</div>

<script>
// Hàm tính RSI
function calculateRSI(prices, period = 14) {
    let gains = 0;
    let losses = 0;
    for (let i = 1; i <= period; i++) {
        let diff = prices[i] - prices[i - 1];
        if (diff > 0) gains += diff;
        else losses -= diff;
    }
    let avgGain = gains / period;
    let avgLoss = losses / period;
    
    for (let i = period + 1; i < prices.length; i++) {
        let diff = prices[i] - prices[i - 1];
        avgGain = (avgGain * (period - 1) + (diff > 0 ? diff : 0)) / period;
        avgLoss = (avgLoss * (period - 1) + (diff < 0 ? -diff : 0)) / period;
    }
    if (avgLoss === 0) return 100;
    let rs = avgGain / avgLoss;
    return 100 - (100 / (1 + rs));
}

// Hàm tính EMA
function calculateEMA(prices, period) {
    let k = 2 / (period + 1);
    let ema = prices[0];
    for (let i = 1; i < prices.length; i++) {
        ema = prices[i] * k + ema * (1 - k);
    }
    return ema;
}

async function fetchDataAndPredict() {
    const symbol = document.getElementById('symbol').value;
    const interval = document.getElementById('interval').value;
    const rsiOverbought = parseFloat(document.getElementById('rsiOverbought').value);
    const rsiOversold = parseFloat(document.getElementById('rsiOversold').value);
    
    const resultDiv = document.getElementById('result');
    const detailsDiv = document.getElementById('details');
    
    resultDiv.className = "result-box NEUTRAL";
    resultDiv.innerText = "ĐANG TÍNH TOÁN...";

    try {
        // Lấy 100 cây nến gần nhất từ API Binance
        const response = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=100`);
        const data = await response.json();
        
        // Chuyển đổi dữ liệu giá đóng cửa (Close Price)
        const closePrices = data.map(candle => parseFloat(candle[4]));
        const currentPrice = closePrices[closePrices.length - 1];

        // 1. Tính toán các chỉ báo
        const rsi = calculateRSI(closePrices, 14);
        const ema7 = calculateEMA(closePrices, 7);
        const ema25 = calculateEMA(closePrices, 25);

        // 2. Thuật toán logic dự đoán (Đã tích hợp bộ lọc điều chỉnh)
        let upScore = 0;
        let downScore = 0;

        // Logic EMA (Xu hướng xuôi dòng)
        if (ema7 > ema25) upScore += 1;
        else downScore += 1;

        // Logic RSI (Vùng đảo chiều)
        if (rsi < rsiOversold) upScore += 2; // Quá bán -> Ưu tiên LÊN cực mạnh
        if (rsi > rsiOverbought) downScore += 2; // Quá mua -> Ưu tiên XUỐNG cực mạnh

        // Điểm đột phá giá hiện tại với EMA
        if (currentPrice > ema7) upScore += 1;
        else downScore += 1;

        // 3. Kết luận kết quả
        let finalPrediction = "NEUTRAL";
        let textResult = "ĐI NGANG (SIDEWAYS)";
        
        if (upScore > downScore && rsi < rsiOverbought) {
            finalPrediction = "UP";
            textResult = "XU HƯỚNG: LÊN (BUY)";
        } else if (downScore > upScore && rsi > rsiOversold) {
            finalPrediction = "DOWN";
            textResult = "XU HƯỚNG: XUỐNG (SELL)";
        }

        // Hiển thị giao diện
        resultDiv.className = `result-box ${finalPrediction}`;
        resultDiv.innerText = textResult;

        detailsDiv.innerHTML = `
            <strong>Giá hiện tại:</strong> ${currentPrice} USDT<br>
            <strong>Chỉ số RSI (14):</strong> ${rsi.toFixed(2)}<br>
            <strong>Đường EMA(7):</strong> ${ema7.toFixed(2)} | <strong>EMA(25):</strong> ${ema25.toFixed(2)}<br>
            <span style="color: #f3ba2f;">*Mẹo: Nếu thấy tỷ lệ sai ở nến ngắn, hãy tăng khung thời gian lên 15m hoặc 1h để triệt tiêu tín hiệu nhiễu.</span>
        `;

    } catch (error) {
        resultDiv.className = "result-box NEUTRAL";
        resultDiv.innerText = "LỖI KẾT NỐI API";
        detailsDiv.innerText = "Không thể lấy dữ liệu từ Binance. Vui lòng kiểm tra lại mạng.";
        console.error(error);
    }
}
</script>

</body>
</html>
