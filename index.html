<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binance Auto-Optimized Predictor</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #12161a;
            color: #eaeaea;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: #1e2329;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h2 { text-align: center; color: #f3ba2f; margin-top: 0; margin-bottom: 5px; }
        .status-bar {
            text-align: center;
            font-size: 12px;
            color: #707a8a;
            margin-bottom: 15px;
        }
        .row { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 14px; color: #aeaeae; }
        select {
            width: 100%;
            padding: 10px;
            background: #2b3139;
            border: 1px solid #474d57;
            color: white;
            border-radius: 5px;
            box-sizing: border-box;
        }
        .opt-box {
            background: rgba(243, 186, 47, 0.1);
            border: 1px dashed #f3ba2f;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 13px;
        }
        .result-box {
            padding: 20px;
            border-radius: 5px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            background: #2b3139;
            transition: all 0.3s ease;
        }
        .UP { color: #0ecb81; border: 2px solid #0ecb81; background: rgba(14, 203, 129, 0.1); }
        .DOWN { color: #f6465d; border: 2px solid #f6465d; background: rgba(246, 70, 93, 0.1); }
        .NEUTRAL { color: #929aa5; border: 2px solid #929aa5; }
        .details {
            margin-top: 15px;
            font-size: 13px;
            color: #aeaeae;
            background: #181a20;
            padding: 10px;
            border-radius: 5px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Binance Smart Predictor</h2>
    <div class="status-bar" id="statusBar">Đang quét dữ liệu nền...</div>
    
    <div class="row">
        <label>Cặp giao dịch:</label>
        <select id="symbol" onchange="triggerImmediateUpdate()">
            <option value="BTCUSDT">BTC/USDT</option>
            <option value="ETHUSDT">ETH/USDT</option>
            <option value="BNBUSDT">BNB/USDT</option>
            <option value="SOLUSDT">SOL/USDT</option>
        </select>
    </div>

    <div class="row">
        <label>Khung thời gian:</label>
        <select id="interval" onchange="triggerImmediateUpdate()">
            <option value="1m">1 Phút</option>
            <option value="5m" selected>5 Phút</option>
            <option value="15m">15 Phút</option>
            <option value="1h">1 Giờ</option>
        </select>
    </div>

    <!-- Hộp hiển thị kết quả AI tối ưu hóa tự động từ lịch sử -->
    <div class="opt-box" id="optMetrics">
        <strong>Trí tuệ nhân tạo (Backtest):</strong> Đang giả lập dữ liệu lịch sử để tìm cấu hình tối ưu...
    </div>

    <div id="result" class="result-box NEUTRAL">ĐANG TÍNH TOÁN...</div>
    
    <div class="details" id="details">
        Hệ thống đang kết nối dữ liệu nến Binance...
    </div>
</div>

<script>
let autoInterval = null;
let countdown = 5;

// Hàm tính toán mảng RSI cho toàn bộ dữ liệu lịch sử để phục vụ Backtest nhanh
function calculateAllRSI(prices, period = 14) {
    let rsiValues = new Array(prices.length).fill(0);
    if (prices.length <= period) return rsiValues;

    let gains = 0, losses = 0;
    for (let i = 1; i <= period; i++) {
        let diff = prices[i] - prices[i - 1];
        if (diff > 0) gains += diff; else losses -= diff;
    }
    let avgGain = gains / period;
    let avgLoss = losses / period;
    rsiValues[period] = avgLoss === 0 ? 100 : 100 - (100 / (1 + (avgGain / avgLoss)));

    for (let i = period + 1; i < prices.length; i++) {
        let diff = prices[i] - prices[i - 1];
        avgGain = (avgGain * (period - 1) + (diff > 0 ? diff : 0)) / period;
        avgLoss = (avgLoss * (period - 1) + (diff < 0 ? -diff : 0)) / period;
        rsiValues[i] = avgLoss === 0 ? 100 : 100 - (100 / (1 + (avgGain / avgLoss)));
    }
    return rsiValues;
}

// Hàm tính mảng EMA
function calculateAllEMA(prices, period) {
    let emaValues = new Array(prices.length).fill(0);
    if (prices.length === 0) return rsiValues;
    let k = 2 / (period + 1);
    let ema = prices[0];
    emaValues[0] = ema;
    for (let i = 1; i < prices.length; i++) {
        ema = prices[i] * k + ema * (1 - k);
        emaValues[i] = ema;
    }
    return emaValues;
}

async function fetchDataAndPredict() {
    const symbol = document.getElementById('symbol').value;
    const interval = document.getElementById('interval').value;
    
    const resultDiv = document.getElementById('result');
    const detailsDiv = document.getElementById('details');
    const optMetricsDiv = document.getElementById('optMetrics');

    try {
        // Tải 500 cây nến để chạy thuật toán tối ưu hóa lịch sử
        const response = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=500`);
        const data = await response.json();
        
        const closePrices = data.map(candle => parseFloat(candle[4]));
        const currentPrice = closePrices[closePrices.length - 1];

        // Tính toán các chỉ báo cho toàn bộ chuỗi lịch sử
        const rsiArray = calculateAllRSI(closePrices, 14);
        const ema7Array = calculateAllEMA(closePrices, 7);
        const ema25Array = calculateAllEMA(closePrices, 25);

        // --- ENGINE TỰ ĐỘNG TỐI ƯU HÓA (BACKTESTING) ---
        // Thử nghiệm các bộ tham số cấu hình RSI khác nhau để tìm ra bộ lọc ít lỗi nhất
        let bestOverbought = 70;
        let bestOversold = 30;
        let maxWinRate = -1;
        let bestTotalSignals = 0;

        const testRanges = [
            {ob: 65, os: 35}, {ob: 70, os: 30}, {ob: 75, os: 25}, {ob: 80, os: 20}
        ];

        testRanges.forEach(config => {
            let correctSignals = 0;
            let totalSignals = 0;

            // Quét lịch sử từ cây nến thứ 50 đến cây nến kế cuối (-2) để kiểm chứng độ chuẩn xác
            for (let i = 50; i < closePrices.length - 1; i++) {
                let upScore = 0, downScore = 0;

                if (ema7Array[i] > ema25Array[i]) upScore += 1.5; else downScore += 1.5;
                if (rsiArray[i] < config.os) upScore += 2;
                if (rsiArray[i] > config.ob) downScore += 2;
                if (closePrices[i] > ema7Array[i]) upScore += 1; else downScore += 1;

                let pred = "NEUTRAL";
                if (upScore > downScore && rsiArray[i] < config.ob) pred = "UP";
                else if (downScore > upScore && rsiArray[i] > config.os) pred = "DOWN";

                if (pred !== "NEUTRAL") {
                    totalSignals++;
                    // So sánh với kết quả thực tế của cây nến tiếp theo (i + 1)
                    let actualMove = closePrices[i+1] > closePrices[i] ? "UP" : "DOWN";
                    if (pred === actualMove) {
                        correctSignals++;
                    }
                }
            }

            let winRate = totalSignals > 0 ? (correctSignals / totalSignals) * 100 : 0;
            if (winRate > maxWinRate && totalSignals > 5) {
                maxWinRate = winRate;
                bestOverbought = config.ob;
                bestOversold = config.os;
                bestTotalSignals = totalSignals;
            }
        });

        // Hiển thị cấu hình tối ưu vừa tìm được từ lịch sử
        optMetricsDiv.innerHTML = `
            <strong>Cấu hình tối ưu tự động:</strong> Quá mua: <span style="color:#f6465d">${bestOverbought}</span> | Quá bán: <span style="color:#0ecb81">${bestOversold}</span><br>
            <strong>Độ chuẩn xác lịch sử (Win Rate):</strong> <span style="color:#f3ba2f; font-weight:bold;">${maxWinRate.toFixed(1)}%</span> (Dựa trên ${bestTotalSignals} tín hiệu điểm vào)
        `;

        // --- ĐƯA RA DỰ ĐOÁN CHO CÂY NẾN HIỆN TẠI VỚI BỘ LỌC TỐI ƯU TRÊN ---
        const lastRSI = rsiArray[rsiArray.length - 1];
        const lastEMA7 = ema7Array[ema7Array.length - 1];
        const lastEMA25 = ema25Array[ema25Array.length - 1];

        let upScore = 0, downScore = 0;
        if (lastEMA7 > lastEMA25) upScore += 1.5; else downScore += 1.5;
        if (lastRSI < bestOversold) upScore += 2;
        if (lastRSI > bestOverbought) downScore += 2;
        if (currentPrice > lastEMA7) upScore += 1; else downScore += 1;

        let finalPrediction = "NEUTRAL";
        let textResult = "ĐI NGANG (SIDEWAYS)";
        
        if (upScore > downScore && lastRSI < bestOverbought) {
            finalPrediction = "UP";
            textResult = "MUA (UP)";
        } else if (downScore > upScore && lastRSI > bestOversold) {
            finalPrediction = "DOWN";
            textResult = "BÁN (DOWN)";
        }

        resultDiv.className = `result-box ${finalPrediction}`;
        resultDiv.innerText = textResult;

        detailsDiv.innerHTML = `
            <strong>Giá hiện tại:</strong> ${currentPrice} USDT<br>
            <strong>Chỉ số RSI:</strong> ${lastRSI.toFixed(2)}<br>
            <strong>Đường EMA(7):</strong> ${lastEMA7.toFixed(2)} | <strong>EMA(25):</strong> ${lastEMA25.toFixed(2)}
        `;
    } catch (error) {
        console.error("Lỗi thuật toán tối ưu:", error);
    }
}

function startAutoUpdate() {
    if(autoInterval) clearInterval(autoInterval);
    countdown = 5;
    
    autoInterval = setInterval(() => {
        countdown--;
        if(countdown <= 0) {
            document.getElementById('statusBar').innerText = "Đang tối ưu & quét lại dữ liệu...";
            fetchDataAndPredict();
            countdown = 5; 
        } else {
            document.getElementById('statusBar').innerText = `Tự động tối ưu lại sau: ${countdown}s`;
        }
    }, 1000);
}

function triggerImmediateUpdate() {
    document.getElementById('result').className = "result-box NEUTRAL";
    document.getElementById('result').innerText = "ĐANG TÍNH TOÁN...";
    fetchDataAndPredict();
    startAutoUpdate();
}

// Chạy khởi tạo
fetchDataAndPredict();
startAutoUpdate();
</script>

</body>
</html>
