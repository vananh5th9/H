<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binance Auto Predictor</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #12161a;
            color: #eaeaea;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: #1e2329;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h2 { text-align: center; color: #f3ba2f; margin-top: 0; }
        .row { margin-bottom: 15px; }
        label { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 14px; color: #aeaeae; }
        label span { color: #f3ba2f; font-weight: bold; }
        select, input[type="range"] {
            width: 100%;
            box-sizing: border-box;
        }
        select {
            padding: 10px;
            background: #2b3139;
            border: 1px solid #474d57;
            color: white;
            border-radius: 5px;
        }
        input[type="range"] {
            margin-top: 5px;
            accent-color: #f3ba2f;
        }
        .status-bar {
            text-align: center;
            font-size: 12px;
            color: #707a8a;
            margin-bottom: 15px;
        }
        .result-box {
            margin-top: 15px;
            padding: 20px;
            border-radius: 5px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            background: #2b3139;
            transition: all 0.3s ease;
        }
        .UP { color: #0ecb81; border: 2px solid #0ecb81; background: rgba(14, 203, 129, 0.1); }
        .DOWN { color: #f6465d; border: 2px solid #f6465d; background: rgba(246, 70, 93, 0.1); }
        .NEUTRAL { color: #929aa5; border: 2px solid #929aa5; }
        .details {
            margin-top: 15px;
            font-size: 13px;
            color: #aeaeae;
            background: #181a20;
            padding: 10px;
            border-radius: 5px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Binance Auto Predictor</h2>
    <div class="status-bar" id="statusBar">Đang khởi tạo hệ thống tự động...</div>
    
    <div class="row">
        <label>Cặp giao dịch:</label>
        <select id="symbol" onchange="triggerImmediateUpdate()">
            <option value="BTCUSDT">BTC/USDT</option>
            <option value="ETHUSDT">ETH/USDT</option>
            <option value="BNBUSDT">BNB/USDT</option>
            <option value="SOLUSDT">SOL/USDT</option>
        </select>
    </div>

    <div class="row">
        <label>Khung thời gian:</label>
        <select id="interval" onchange="triggerImmediateUpdate()">
            <option value="1m">1 Phút (Nhiều nhiễu)</option>
            <option value="5m" selected>5 Phút (Cân bằng)</option>
            <option value="15m">15 Phút (Chuẩn xác cao)</option>
            <option value="1h">1 Giờ (Xu hướng lớn)</option>
        </select>
    </div>

    <hr style="border-color: #2b3139; margin: 20px 0;">
    <h3 style="color: #f3ba2f; font-size: 15px; margin-bottom: 15px;">Thanh trượt tối ưu thuật toán (Tự động áp dụng)</h3>
    
    <div class="row">
        <label>Ngưỡng Quá mua (Giảm báo giả DOWN): <span id="valOverbought">70</span></label>
        <input type="range" id="rsiOverbought" min="60" max="85" value="70" oninput="updateSliders()">
    </div>
    <div class="row">
        <label>Ngưỡng Quá bán (Giảm báo giả UP): <span id="valOversold">30</span></label>
        <input type="range" id="rsiOversold" min="15" max="40" value="30" oninput="updateSliders()">
    </div>

    <div id="result" class="result-box NEUTRAL">ĐANG QUÉT DỮ LIỆU...</div>
    
    <div class="details" id="details">
        Hệ thống đang đồng bộ với API Binance...
    </div>
</div>

<script>
let autoInterval = null;
let countdown = 5;

function updateSliders() {
    document.getElementById('valOverbought').innerText = document.getElementById('rsiOverbought').value;
    document.getElementById('valOversold').innerText = document.getElementById('rsiOversold').value;
    // Cập nhật lại dự đoán ngay lập tức khi người dùng kéo thanh trượt mà không đợi hết 5s
    fetchDataAndPredict();
}

function calculateRSI(prices, period = 14) {
    let gains = 0, losses = 0;
    for (let i = 1; i <= period; i++) {
        let diff = prices[i] - prices[i - 1];
        if (diff > 0) gains += diff; else losses -= diff;
    }
    let avgGain = gains / period, avgLoss = losses / period;
    for (let i = period + 1; i < prices.length; i++) {
        let diff = prices[i] - prices[i - 1];
        avgGain = (avgGain * (period - 1) + (diff > 0 ? diff : 0)) / period;
        avgLoss = (avgLoss * (period - 1) + (diff < 0 ? -diff : 0)) / period;
    }
    return avgLoss === 0 ? 100 : 100 - (100 / (1 + (avgGain / avgLoss)));
}

function calculateEMA(prices, period) {
    let k = 2 / (period + 1), ema = prices[0];
    for (let i = 1; i < prices.length; i++) {
        ema = prices[i] * k + ema * (1 - k);
    }
    return ema;
}

async function fetchDataAndPredict() {
    const symbol = document.getElementById('symbol').value;
    const interval = document.getElementById('interval').value;
    const rsiOverbought = parseFloat(document.getElementById('rsiOverbought').value);
    const rsiOversold = parseFloat(document.getElementById('rsiOversold').value);
    
    const resultDiv = document.getElementById('result');
    const detailsDiv = document.getElementById('details');

    try {
        const response = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=100`);
        const data = await response.json();
        
        const closePrices = data.map(candle => parseFloat(candle[4]));
        const currentPrice = closePrices[closePrices.length - 1];

        const rsi = calculateRSI(closePrices, 14);
        const ema7 = calculateEMA(closePrices, 7);
        const ema25 = calculateEMA(closePrices, 25);

        let upScore = 0, downScore = 0;

        // Thuật toán chấm điểm xu hướng
        if (ema7 > ema25) upScore += 1.5; else downScore += 1.5;
        if (rsi < rsiOversold) upScore += 2;
        if (rsi > rsiOverbought) downScore += 2;
        if (currentPrice > ema7) upScore += 1; else downScore += 1;

        let finalPrediction = "NEUTRAL";
        let textResult = "ĐI NGANG (SIDEWAYS)";
        
        if (upScore > downScore && rsi < rsiOverbought) {
            finalPrediction = "UP";
            textResult = `MUA (UP) - Lực: ${upScore}`;
        } else if (downScore > upScore && rsi > rsiOversold) {
            finalPrediction = "DOWN";
            textResult = `BÁN (DOWN) - Lực: ${downScore}`;
        }

        resultDiv.className = `result-box ${finalPrediction}`;
        resultDiv.innerText = textResult;

        detailsDiv.innerHTML = `
            <strong>Giá hiện tại:</strong> ${currentPrice} USDT<br>
            <strong>Chỉ số RSI (14):</strong> ${rsi.toFixed(2)} ${rsi > rsiOverbought ? '⚠️ (Quá mua)' : rsi < rsiOversold ? '⚠️ (Quá bán)' : ''}<br>
            <strong>Đường EMA(7):</strong> ${ema7.toFixed(2)} | <strong>EMA(25):</strong> ${ema25.toFixed(2)}
        `;
    } catch (error) {
        console.error(error);
    }
}

function startAutoUpdate() {
    if(autoInterval) clearInterval(autoInterval);
    countdown = 5;
    
    autoInterval = setInterval(() => {
        countdown--;
        if(countdown <= 0) {
            document.getElementById('statusBar').innerText = "Đang tự động cập nhật dữ liệu...";
            fetchDataAndPredict();
            countdown = 5; 
        } else {
            document.getElementById('statusBar').innerText = `Tự động cập nhật sau: ${countdown}s (Thời gian thực)`;
        }
    }, 1000);
}

function triggerImmediateUpdate() {
    document.getElementById('result').className = "result-box NEUTRAL";
    document.getElementById('result').innerText = "ĐANG CHUYỂN CẶP...";
    fetchDataAndPredict();
    startAutoUpdate();
}

// Khởi chạy ngay khi mở trang
fetchDataAndPredict();
startAutoUpdate();
</script>

</body>
</html>
